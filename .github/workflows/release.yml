name: Release

on:
  push:
    tags:
      - "v*"


permissions:
  contents: write

concurrency:
  group: scoutd-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ github.ref_name }}
      AWS_DEFAULT_REGION: eu-west-par
      AWS_EC2_METADATA_DISABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install release tools
        run: |
            sudo apt-get update
            sudo apt-get install -y e2fsprogs fakeroot awscli

      - name: Show Zig version
        run: zig version

        # Build the static scoutd binary exactly the same way every release.

      - name: Build scoutd release binary
        run: |
            mkdir -p dist
            zig build --release=small
            cp zig-out/bin/scoutd "dist/scoutd-${VERSION}-x86_64-linux-musl"
            chmod +x "dist/scoutd-${VERSION}-x86_64-linux-musl"    
      

      # Build the bootable guest rootfs image from the freshly built binary.
      - name: Build scoutd rootfs image
        run: |
            ./scripts/release/build-rootfs.sh "${VERSION}" "dist/scoutd-${VERSION}-x86_64-linux-musl"    
          

      # Keep validation explicit so a bad image fails before publishing.
      - name: Validate release artifacts
        run: |
            file "dist/scoutd-${VERSION}-x86_64-linux-musl"
            file "dist/scoutd-rootfs-${VERSION}-x86_64-ext4"
            debugfs -R "stat /sbin/init" "dist/scoutd-rootfs-${VERSION}-x86_64-ext4" >/dev/null 2>&1    
      

      # Publish both artifacts to the GitHub release for the tag.
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
            if gh release view "${VERSION}" >/dev/null 2>&1; then
              gh release upload "${VERSION}" \
                "dist/scoutd-${VERSION}-x86_64-linux-musl" \
                "dist/scoutd-rootfs-${VERSION}-x86_64-ext4" \
                --clobber
            else
              gh release create "${VERSION}" \
                "dist/scoutd-${VERSION}-x86_64-linux-musl" \
                "dist/scoutd-rootfs-${VERSION}-x86_64-ext4" \
                --title "scoutd ${VERSION}" \
                --notes "Release ${VERSION} of scoutd. This release includes the static scoutd binary and a minimal bootable ext4 rootfs artifact for Firecracker guests."
            fi    
          
          # Upload the same immutable artifacts to the OVH bucket.
          #
          # OVH does not support the bucket policy flow  every upload
          # must still set public-read explicitly.

      - name: Upload release artifacts to OVH
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_ACCESS_KEY }}
        run: |
          aws --endpoint-url https://s3.eu-west-par.io.cloud.ovh.net \
            s3 cp "dist/scoutd-rootfs-${VERSION}-x86_64-ext4" \
            "s3://spacescale-runtime-assets/scoutd-rootfs-${VERSION}-x86_64-ext4" \
            --acl public-read  
        
