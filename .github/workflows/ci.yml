name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: scoutd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Show Zig version
        run: zig version

      - name: Build scoutd
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Check guest target
        run: zig build check-guest
